<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cohérence cardiaque</title>
<style>
  :root {
    --pink: #E7B8D6;
    --lilac: #C9B6E4;
    --pink-light: #F4E3EE;
    --purple-text: #6B4E7A;
    --purple-soft: #7C5FA0;
    --purple-muted: #9B7FAE;
    --purple-faint: #9B8AA8;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(180deg, #FDF7FB 0%, #F3ECFA 100%);
    min-height: 100vh;
    padding: 32px 20px;
  }

  .card {
    background: #FFFFFF;
    border-radius: 24px;
    box-shadow: 0 10px 40px rgba(160, 120, 180, 0.15);
    padding: 36px 32px;
    max-width: 420px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 22px;
  }

  .screen { display: none; }
  .screen.active { display: flex; flex-direction: column; align-items: center; gap: 22px; width: 100%; }

  h2.title {
    color: var(--purple-text);
    font-size: 22px;
    font-weight: 600;
    margin: 0;
    text-align: center;
  }

  .section-label {
    color: var(--purple-muted);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .section-block { width: 100%; }

  .choice-row { display: flex; gap: 12px; width: 100%; }

  .choice-btn {
    flex: 1;
    padding: 12px 8px;
    border-radius: 14px;
    border: 2px solid #EADFF0;
    background: #FFFFFF;
    color: #9B8AA8;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .choice-btn.active {
    border: 2px solid #C589C9;
    background: #F5E7F5;
    color: #8A4E93;
  }

  .primary-btn {
    margin-top: 6px;
    padding: 14px 40px;
    border-radius: 999px;
    border: none;
    background: linear-gradient(135deg, #D9A0D9 0%, #B29AE0 100%);
    color: #FFFFFF;
    font-weight: 600;
    font-size: 16px;
    cursor: pointer;
    box-shadow: 0 6px 18px rgba(178, 154, 224, 0.4);
  }

  .control-btn {
    padding: 12px 30px;
    border-radius: 999px;
    border: 2px solid var(--lilac);
    background: #FFFFFF;
    color: var(--purple-soft);
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
  }

  .control-btn.stop {
    border: 2px solid #E0B8C6;
    color: #B4718A;
  }

  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
  }

  .checkbox-row.centered {
    justify-content: center;
    gap: 8px;
  }

  .checkbox-row input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: #B29AE0;
  }

  .checkbox-row.centered input[type="checkbox"] {
    width: 16px;
    height: 16px;
  }

  .checkbox-row span {
    color: var(--purple-soft);
    font-size: 15px;
  }

  .checkbox-row.centered span {
    color: var(--purple-muted);
    font-size: 13px;
  }

  .intro-text {
    color: var(--purple-text);
    font-size: 17px;
    line-height: 1.6;
    text-align: center;
    margin: 0;
  }

  .phase-label {
    color: var(--purple-soft);
    font-size: 24px;
    font-weight: 600;
    letter-spacing: 0.03em;
  }

  .buttons-row {
    display: flex;
    gap: 16px;
  }

  .finished-text {
    color: var(--purple-faint);
    text-align: center;
    margin: 0;
  }

  #rosace-group {
    transform-origin: 120px 120px;
  }

  @keyframes petal-inspire-anim {
    from { transform: scale(0.62); }
    to   { transform: scale(1.15); }
  }
  @keyframes petal-expire-anim {
    from { transform: scale(1.15); }
    to   { transform: scale(0.62); }
  }
</style>
</head>
<body>

  <audio id="bg-audio" loop preload="auto"
    src="https://res.cloudinary.com/m0dwlgrs/video/upload/v1783301998/howls_moving_castle_with_rain_and_thunder_owzgmk.mp3">
  </audio>

  <!-- Écran 1 : configuration -->
  <div class="card screen active" id="screen-setup">
    <h2 class="title">Cohérence cardiaque</h2>

    <div class="section-block">
      <div class="section-label">Rythme respiratoire</div>
      <div class="choice-row">
        <button class="choice-btn active" data-rhythm="3-3-6" onclick="selectRhythm('3-3-6', this)">3 - 3 - 6</button>
        <button class="choice-btn" data-rhythm="4-4-8" onclick="selectRhythm('4-4-8', this)">4 - 4 - 8</button>
      </div>
    </div>

    <div class="section-block">
      <div class="section-label">Durée</div>
      <div class="choice-row">
        <button class="choice-btn active" data-duration="3" onclick="selectDuration(3, this)">3 minutes</button>
        <button class="choice-btn" data-duration="5" onclick="selectDuration(5, this)">5 minutes</button>
      </div>
    </div>

    <label class="checkbox-row">
      <input type="checkbox" id="music-enabled-checkbox" onchange="state.musicEnabled = this.checked">
      <span>Musique de fond pendant la séance</span>
    </label>

    <label class="checkbox-row">
      <input type="checkbox" id="ding-enabled-checkbox" onchange="state.dingEnabled = this.checked">
      <span>Signal sonore (ding) entre les phases</span>
    </label>

    <button class="primary-btn" onclick="goToIntro()">Continuer</button>
  </div>

  <!-- Écran 2 : intro -->
  <div class="card screen" id="screen-intro">
    <p class="intro-text">
      Maintenant, pense à avoir une respiration ventrale. Imagine ton
      ventre se gonfler et se dégonfler, tel un ballon.
    </p>
    <button class="primary-btn" onclick="beginActivity()">Commencer</button>
  </div>

  <!-- Écran 3 : activité -->
  <div class="card screen" id="screen-activity" style="gap: 26px;">
    <svg viewBox="0 0 240 240" width="260" height="260">
      <circle cx="120" cy="120" r="118" fill="#FBF6FA" />
      <g id="rosace-group">
        <ellipse cx="120" cy="72" rx="26" ry="52" fill="#E7B8D6" opacity="0.85" transform="rotate(0 120 120)"></ellipse>
        <ellipse cx="120" cy="72" rx="26" ry="52" fill="#C9B6E4" opacity="0.85" transform="rotate(45 120 120)"></ellipse>
        <ellipse cx="120" cy="72" rx="26" ry="52" fill="#E7B8D6" opacity="0.85" transform="rotate(90 120 120)"></ellipse>
        <ellipse cx="120" cy="72" rx="26" ry="52" fill="#C9B6E4" opacity="0.85" transform="rotate(135 120 120)"></ellipse>
        <ellipse cx="120" cy="72" rx="26" ry="52" fill="#E7B8D6" opacity="0.85" transform="rotate(180 120 120)"></ellipse>
        <ellipse cx="120" cy="72" rx="26" ry="52" fill="#C9B6E4" opacity="0.85" transform="rotate(225 120 120)"></ellipse>
        <ellipse cx="120" cy="72" rx="26" ry="52" fill="#E7B8D6" opacity="0.85" transform="rotate(270 120 120)"></ellipse>
        <ellipse cx="120" cy="72" rx="26" ry="52" fill="#C9B6E4" opacity="0.85" transform="rotate(315 120 120)"></ellipse>
        <circle cx="120" cy="120" r="22" fill="#F4E3EE" stroke="#D9A9CE" stroke-width="2" />
      </g>
    </svg>

    <div class="phase-label" id="phase-label">Inspire</div>

    <div class="buttons-row">
      <button class="control-btn" id="pause-resume-btn" onclick="togglePause()">Pause</button>
      <button class="control-btn stop" onclick="stopActivity()">Stop</button>
    </div>

    <label class="checkbox-row centered" id="music-toggle-row" style="display:none;">
      <input type="checkbox" id="music-on-checkbox" checked onchange="toggleMusicDuringActivity(this.checked)">
      <span>Musique</span>
    </label>
  </div>

  <!-- Écran 4 : fin -->
  <div class="card screen" id="screen-finished">
    <h2 class="title">Séance terminée</h2>
    <p class="finished-text">Prenez un instant avant de reprendre vos activités.</p>
    <button class="primary-btn" onclick="restart()">Nouvelle séance</button>
  </div>

  <script>
    const RHYTHMS = {
      "3-3-6": { inspire: 3, bloque: 3, expire: 6 },
      "4-4-8": { inspire: 4, bloque: 4, expire: 8 },
    };

    const state = {
      rhythmKey: "3-3-6",
      durationMin: 3,
      musicEnabled: false,
      musicOn: true,
      dingEnabled: false,
      phaseIndex: 0,
      phaseTimeout: null,
      phaseEndTime: 0,
      totalEndTime: 0,
      pauseStartTime: 0,
      pausedRemaining: 0,
      isPaused: false,
    };

    let audioCtx = null;

    function playDing() {
      if (!state.dingEnabled || !audioCtx) return;
      const now = audioCtx.currentTime;
      const fundamental = 222; // tonalité grave, façon bol tibétain

      // partiels inharmoniques typiques d'un bol chantant, chacun avec sa propre décroissance
      const partials = [
        { ratio: 1.00, gain: 0.34, decay: 2.4 },
        { ratio: 2.76, gain: 0.16, decay: 1.7 },
        { ratio: 4.10, gain: 0.09, decay: 1.1 },
        { ratio: 5.40, gain: 0.05, decay: 0.7 },
      ];

      const master = audioCtx.createGain();
      master.gain.value = 1;
      master.connect(audioCtx.destination);

      partials.forEach((p) => {
        const freq = fundamental * p.ratio;
        // deux oscillateurs très légèrement désaccordés = scintillement (battements) du bol
        [-0.8, 0.8].forEach((detune) => {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = "sine";
          osc.frequency.value = freq + detune;

          gain.gain.setValueAtTime(0.0001, now);
          gain.gain.exponentialRampToValueAtTime(p.gain * 0.5, now + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + p.decay);

          osc.connect(gain).connect(master);
          osc.start(now);
          osc.stop(now + p.decay + 0.1);
        });
      });
    }

    const audio = document.getElementById("bg-audio");
    const rosaceGroup = document.getElementById("rosace-group");
    const phaseLabel = document.getElementById("phase-label");
    const musicToggleRow = document.getElementById("music-toggle-row");
    const pauseResumeBtn = document.getElementById("pause-resume-btn");

    function showScreen(id) {
      document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
      document.getElementById(id).classList.add("active");
    }

    function selectRhythm(key, btn) {
      state.rhythmKey = key;
      btn.parentElement.querySelectorAll(".choice-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
    }

    function selectDuration(min, btn) {
      state.durationMin = min;
      btn.parentElement.querySelectorAll(".choice-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
    }

    function goToIntro() {
      showScreen("screen-intro");
    }

    function getPhases() {
      const r = RHYTHMS[state.rhythmKey];
      return [
        { name: "inspire", label: "Inspire", dur: r.inspire * 1000 },
        { name: "bloque", label: "Bloque", dur: r.bloque * 1000 },
        { name: "expire", label: "Expire", dur: r.expire * 1000 },
      ];
    }

    function applyPhaseAnimation(phase, durSec) {
      rosaceGroup.style.animation = "none";
      // force reflow to restart animation
      void rosaceGroup.offsetWidth;

      if (phase === "inspire") {
        rosaceGroup.style.animation = `petal-inspire-anim ${durSec}s ease-in-out forwards`;
      } else if (phase === "expire") {
        rosaceGroup.style.animation = `petal-expire-anim ${durSec}s ease-in-out forwards`;
      } else {
        // bloque : reste figé à l'échelle maximale (fin de l'inspire)
        rosaceGroup.style.animation = "none";
        rosaceGroup.style.transform = "scale(1.15)";
      }
    }

    function startPhase(idx, now) {
      const phases = getPhases();
      const p = phases[idx];
      state.phaseIndex = idx;
      state.phaseEndTime = now + p.dur;
      phaseLabel.textContent = p.label;
      applyPhaseAnimation(p.name, p.dur / 1000);

      clearTimeout(state.phaseTimeout);
      state.phaseTimeout = setTimeout(onPhaseEnd, p.dur);
    }

    function onPhaseEnd() {
      const now = Date.now();
      if (now >= state.totalEndTime) {
        clearTimeout(state.phaseTimeout);
        audio.pause();
        showScreen("screen-finished");
        return;
      }
      playDing();
      const phases = getPhases();
      const nextIdx = (state.phaseIndex + 1) % phases.length;
      startPhase(nextIdx, now);
    }

    function beginActivity() {
      const now = Date.now();
      state.totalEndTime = now + state.durationMin * 60 * 1000;
      state.musicOn = true;

      if (state.dingEnabled) {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        audioCtx.resume();
      }

      if (state.musicEnabled) {
        audio.volume = 0.5;
        audio.currentTime = 0;
        audio.play().catch(() => {});
        musicToggleRow.style.display = "flex";
        document.getElementById("music-on-checkbox").checked = true;
      } else {
        musicToggleRow.style.display = "none";
      }

      showScreen("screen-activity");
      pauseResumeBtn.textContent = "Pause";
      state.isPaused = false;
      startPhase(0, now);
    }

    function togglePause() {
      if (!state.isPaused) {
        // passage en pause
        clearTimeout(state.phaseTimeout);
        state.pauseStartTime = Date.now();
        state.pausedRemaining = Math.max(state.phaseEndTime - Date.now(), 0);
        rosaceGroup.style.animationPlayState = "paused";
        audio.pause();
        state.isPaused = true;
        pauseResumeBtn.textContent = "Reprendre";
      } else {
        // reprise
        const now = Date.now();
        const pausedDuration = now - state.pauseStartTime;
        state.totalEndTime += pausedDuration;
        state.phaseEndTime = now + state.pausedRemaining;
        rosaceGroup.style.animationPlayState = "running";
        if (state.musicEnabled && state.musicOn) {
          audio.play().catch(() => {});
        }
        clearTimeout(state.phaseTimeout);
        state.phaseTimeout = setTimeout(onPhaseEnd, state.pausedRemaining);
        state.isPaused = false;
        pauseResumeBtn.textContent = "Pause";
      }
    }

    function toggleMusicDuringActivity(checked) {
      state.musicOn = checked;
      if (checked && !state.isPaused) {
        audio.play().catch(() => {});
      } else {
        audio.pause();
      }
    }

    function stopActivity() {
      clearTimeout(state.phaseTimeout);
      audio.pause();
      showScreen("screen-setup");
    }

    function restart() {
      showScreen("screen-setup");
    }
  </script>

</body>
</html>
